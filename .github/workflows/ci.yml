name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Check for leftover merge markers
        run: |
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- 'Sources/**' 'Tests/**' 'Package.swift'; then
            echo "::error::Found unresolved merge conflict markers"
            exit 1
          fi
